<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>nao2bs — Blog & Portfolio</title>
    <meta name="description" content="Blog と Portfolio をまとめたシンプルな GitHub Pages モック（Tailwind CSS）" />

    <!-- Tailwind CDN (good for mock/prototype). For production, consider a build step. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Optional Tailwind config for colors & fonts
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5a4',
                        accent: '#7c3aed'
                    }
                }
            }
        }
    </script>
    <!-- Custom Markdown/post styles -->
    <link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}">

</head>

<body class="bg-gray-50 text-gray-800 antialiased">
    {% include header.html %}

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="post-content">
            {{ content }}
        </div>
    </main>

    {% include extensions/click-to-top.html %}
  
</body>

</html>
